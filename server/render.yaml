services:
  - type: web
    name: svs-grands-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
